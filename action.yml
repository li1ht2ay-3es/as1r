description: windows mingw compiler


inputs:
  token:
    description: github token
    required: false
    default: ''

  arch:
    description: system platform
    required: false
    default: x64


runs:
  using: composite

  steps:
    - uses: li1ht2ay-3es/gi1-ac2io3s@checkout-repo
      with:
        branch: upstream

        token: ${{ inputs.token }}
        auto: true


    - uses: li1ht2ay-3es/gi1-ac2io3s@mingw-install
      with:
        arch: ${{ inputs.arch }}


    - uses: hendrikmuhs/ccache-action@main
      with:
        key: ${{ inputs.arch }}


    - shell: bash
      run: |
        sudo apt-get install \
          binutils-mingw-w64-i686 \
          g++-mingw-w64-i686 \
          gcc-mingw-w64-i686 \
          mingw-w64-i686-dev


    - shell: bash
      run: |
        merge () {
          echo "<<< ===  merging  $1  === >>>";
          if [[ -z "$2" ]]; then
            git merge origin/$1 || { git diff --diff-filter=U; exit 1; }
          else
            git merge origin/$1 || { git diff --diff-filter=U; git merge --abort; git merge -X $2 origin/$1; }
          fi
          echo "";
        }


        merge mingw-flags
        # merge gameboy-prof9



    - shell: bash
      env:
        CC: ccache ${{ env.MINGW_CC }}
        CXX: ccache ${{ env.MINGW_CXX }}
        CC1: ${{ env.CC }}
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=../cmake/mingw-x86.cmake -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DASAR_GEN_DLL=OFF -DASAR_GEN_LIB=OFF -DASAR_COVERAGE=OFF $CMAKE_EXTRA_OPTS ${{github.workspace}}/src
        make

        # cmake -S ${{github.workspace}}/cmake -B ${{ github.workspace }}/build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DASAR_GEN_DLL=OFF -DASAR_GEN_LIB=OFF -DASAR_COVERAGE=OFF
        # cmake -S ${{github.workspace}}/src -B ${{ github.workspace }}/build --config Release
        # ls -R



    - uses: actions/upload-artifact@main
      with:
        name: asar_${{ inputs.arch }}
        path: |
          build/armips.exe
